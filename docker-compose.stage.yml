# Stage overlay — adapts URLs for GitHub Codespaces port forwarding.
# Usage: docker compose -f docker-compose.yml -f docker-compose.stage.yml up -d

services:
  backend:
    environment:
      CORS_ORIGINS: "https://${CODESPACE_NAME}-5173.${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN:-app.github.dev},http://localhost:5173,http://localhost:3000"

  frontend:
    environment:
      VITE_API_URL: "/api"
      VITE_WS_URL: "/ws"
      # Vite dev server proxies /api and /ws to the backend container,
      # so all browser requests go to the same origin — no CORS needed.
